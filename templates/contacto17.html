{% extends "base.html" %}

{% block title %}Aula 17 - Validação Pro{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>Formulário de Contacto Completo</h2>

    {% if erro %}
        <div class="alert alert-danger">{{ erro }}</div>
    {% endif %}
    {% if sucesso %}
        <div class="alert alert-success">{{ sucesso }}</div>
    {% endif %}

    <form action="/contacto17" method="POST" class="shadow p-4 rounded bg-light">
        <div class="mb-3">
            <label class="form-label">Nome Completo:</label>
            <input type="text" name="nome" class="form-control" value="{{ nome }}" required>
        </div>

        <div class="row">
            <div class="col-md-8 mb-3">
                <label class="form-label">E-mail:</label>
                <input type="email" name="email" class="form-control" value="{{ email }}" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Idade:</label>
                <input type="number" name="idade" class="form-control" value="{{ idade }}" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Mensagem:</label>
            <textarea name="mensagem" class="form-control" rows="4" required>{{ mensagem }}</textarea>
        </div>

        <button type="submit" class="btn btn-dark w-100">Enviar e Validar</button>
    </form>
</div>
{% endblock %}

{% extends "base23.html" %}

{% block title %}Registo - Aula 20{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="mb-4">Criar Nova Conta</h2>

            {% if erro %}
                <div class="alert alert-danger">{{ erro }}</div>
            {% endif %}

            <form action="/registar20" method="POST" class="shadow p-4 rounded bg-light">
                <div class="mb-3">
                    <label class="form-label">Nome de Utilizador:</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail:</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password:</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Finalizar Registo</button>
                <p class="mt-3 text-center">
                    Já tem conta? <a href="/login20">Faça Login</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
